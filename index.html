<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Record Room</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0e0e;--surface:#171717;--surface2:#1f1f1f;--border:#2a2a2a;--gold:#c9a84c;--gold-dim:#7a6030;--text:#e8e2d6;--text-dim:#6b6560;--text-mid:#a09890}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
  header{position:sticky;top:0;z-index:100;background:rgba(14,14,14,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem}
  .header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;height:64px}
  .site-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);white-space:nowrap}
  .site-title span{font-style:italic}
  .record-count{font-size:.62rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
  .search-wrap{flex:1;position:relative;max-width:360px}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
  #search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 12px 8px 34px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;outline:none;transition:border-color .2s}
  #search:focus{border-color:var(--gold-dim)}
  #search::placeholder{color:var(--text-dim)}
  .sort-controls{display:flex;gap:.35rem;margin-left:auto;flex-shrink:0}
  .sort-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .sort-btn:hover{border-color:var(--gold-dim);color:var(--text)}
  .sort-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07)}
  .main{max-width:1400px;margin:0 auto;padding:2rem}
  .no-results{text-align:center;padding:6rem 2rem;color:var(--text-dim);font-size:.85rem;letter-spacing:.05em;display:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:1.4rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;overflow:hidden;animation:fadeIn .3s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card:hover{transform:translateY(-3px);border-color:var(--gold-dim);box-shadow:0 8px 28px rgba(0,0,0,.5)}
  .card-art{width:100%;aspect-ratio:1;background:var(--surface2);position:relative;overflow:hidden}
  .card-art img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .card:hover .card-art img{transform:scale(1.04)}
  .card-art-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--surface2)}
  .card-art-placeholder svg{width:52px;height:52px;color:var(--border)}
  .card-art-loading{width:100%;height:100%;background:linear-gradient(90deg,var(--surface2) 25%,#252525 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .format-badge{position:absolute;bottom:8px;right:8px;background:rgba(14,14,14,.85);border:1px solid var(--border);color:var(--text-dim);font-size:.57rem;letter-spacing:.08em;padding:2px 6px;border-radius:2px;text-transform:uppercase;backdrop-filter:blur(4px)}
  .card-info{padding:12px 13px}
  .card-artist{font-size:.63rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-title{font-family:'Playfair Display',serif;font-size:.93rem;line-height:1.3;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
  .card-meta{font-size:.61rem;color:var(--text-dim);letter-spacing:.04em}
  .letter-divider{grid-column:1/-1;display:flex;align-items:center;gap:1rem;padding:.5rem 0 .25rem}
  .letter-divider span{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);line-height:1;font-style:italic}
  .letter-divider hr{flex:1;border:none;border-top:1px solid var(--border)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:6px;max-width:760px;width:100%;max-height:90vh;overflow-y:auto;transform:scale(.96);transition:transform .2s;scrollbar-width:thin;scrollbar-color:var(--border) transparent;position:relative}
  .modal-overlay.open .modal{transform:scale(1)}
  .modal-top{display:flex;min-height:260px}
  .modal-art{width:260px;flex-shrink:0;background:var(--surface2);overflow:hidden;border-radius:6px 0 0 0}
  .modal-art img{width:100%;height:100%;object-fit:cover;display:block}
  .modal-art-loading{width:100%;min-height:260px;background:linear-gradient(90deg,var(--surface2) 25%,#252525 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
  .modal-art-fallback{width:100%;min-height:260px;display:flex;align-items:center;justify-content:center}
  .modal-art-fallback svg{width:80px;height:80px;color:var(--border)}
  .modal-details{flex:1;padding:2rem 2rem 2rem 1.8rem;display:flex;flex-direction:column;gap:.5rem;min-width:0}
  .modal-artist{font-size:.7rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase}
  .modal-title{font-family:'Playfair Display',serif;font-size:1.45rem;line-height:1.25;color:var(--text);margin-bottom:.5rem}
  .modal-fields{display:grid;grid-template-columns:auto 1fr;gap:.3rem 1rem;margin-top:.5rem}
  .modal-field-label{font-size:.62rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;padding-top:2px}
  .modal-field-value{font-size:.8rem;color:var(--text-mid)}
  .modal-close{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:3px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:10}
  .modal-close:hover{border-color:var(--gold-dim);color:var(--text)}
  .modal-tracks{border-top:1px solid var(--border);padding:1.5rem 2rem}
  .modal-tracks-label{font-size:.62rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1rem}
  .tracks-content{font-size:.78rem;color:var(--text-mid);line-height:1.9;white-space:pre-line;columns:2;column-gap:2rem}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  @media(max-width:700px){.header-inner{flex-wrap:wrap;height:auto;padding:.75rem 0;gap:.75rem}.site-title{font-size:1.1rem}.sort-controls{order:3;width:100%}.sort-btn{flex:1;text-align:center}.search-wrap{max-width:100%;flex:1}.modal-top{flex-direction:column}.modal-art{width:100%;height:240px;border-radius:6px 6px 0 0}.tracks-content{columns:1}.grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1rem}.main{padding:1rem}header{padding:0 1rem}}
</style>
</head>

    <div class="modal-tracks">

  </div>
</div>

  if(!artQueue.find(x => recordKey(x) === k)) artQueue.push(r);
}

async function fetchArtForRecord(r){
  const k = recordKey(r);
  if(k in artCache) return;
  const wikiTitle = WIKI_TITLES[k];
  if(!wikiTitle){ artCache[k]=null; return; }
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${wikiTitle}&prop=pageimages&format=json&pithumbsize=400&pilicense=any&origin=*`;
    const res = await fetch(url);
    if(!res.ok) throw 0;
    const data = await res.json();
    const pages = data.query?.pages || {};
    const page = Object.values(pages)[0];
    const img = page?.thumbnail?.source || null;
    artCache[k] = img;
  } catch {
    artCache[k] = null;
  }
}

async function processQueue(){
  if(processing) return;
  processing = true;
  while(artQueue.length > 0){
    const record = artQueue.splice(0, 1)[0];
    await fetchArtForRecord(record);
    updateArtInDOM();
    await new Promise(res => setTimeout(res, 700));
  }
  processing = false;
}

function updateArtInDOM(){
  document.querySelectorAll('.card[data-key]').forEach(card => {
    const k = card.dataset.key;
    if(!(k in artCache)) return;
    const slot = card.querySelector('.card-art-loading, .card-art-placeholder');
    if(!slot) return;
    if(artCache[k]){
      const img = document.createElement('img');
      img.src = artCache[k]; img.alt = ''; img.loading = 'lazy';
      slot.replaceWith(img);
    } else {
      const fb = document.createElement('div'); fb.className = 'card-art-placeholder'; fb.innerHTML = vinylSVG;
      slot.replaceWith(fb);
    }
  });
  // update modal if open
  const mk = document.getElementById('modal').dataset.key;
  if(mk && (mk in artCache)){
    const artEl = document.getElementById('modal-art');
    const ld = artEl.querySelector('.modal-art-loading');
    if(ld){
      if(artCache[mk]){ const img = document.createElement('img'); img.src = artCache[mk]; img.alt=''; ld.replaceWith(img); }
      else { const fb = document.createElement('div'); fb.className='modal-art-fallback'; fb.innerHTML=vinylSVG; ld.replaceWith(fb); }
    }
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
let currentSort = 'az';
let currentSearch = '';

function sortKey(r){ return r.artist.replace(/^the\s+/i,'').replace(/^of\s+/i,'').toLowerCase(); }

function getFiltered(){
  let list = [...COLLECTION];
  if(currentSearch){
    const q = currentSearch.toLowerCase();
    list = list.filter(r => r.artist.toLowerCase().includes(q) || r.title.toLowerCase().includes(q));
  }
  if(currentSort==='az') list.sort((a,b) => sortKey(a).localeCompare(sortKey(b)) || a.title.localeCompare(b.title));
  else if(currentSort==='year') list.sort((a,b) => a.year - b.year || a.artist.localeCompare(b.artist));
  else list.sort((a,b) => a.genre.localeCompare(b.genre) || sortKey(a).localeCompare(sortKey(b)));
  return list;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const list = getFiltered();
  document.getElementById('count-label').textContent = `${COLLECTION.length} records`;
  const nr = document.getElementById('no-results');
  if(!list.length){ grid.innerHTML=''; nr.style.display='block'; return; }
  nr.style.display='none';
  let html = '', lastL = null;
  list.forEach((r, i) => {
    if(currentSort==='az'){
      const L = sortKey(r)[0].toUpperCase();
      if(L !== lastL){ lastL=L; html += `<div class="letter-divider"><span>${L}</span><hr></div>`; }
    }
    const k = recordKey(r);
    const url = artCache[k];
    const artHtml = url ? `<img src="${url}" alt="" loading="lazy">` :
                    url===null ? `<div class="card-art-placeholder">${vinylSVG}</div>` :
                    `<div class="card-art-loading"></div>`;
    html += `<div class="card" data-idx="${i}" data-key="${k}" style="animation-delay:${Math.min(i*.015,.4)}s">
      <div class="card-art">${artHtml}<div class="format-badge">${r.format}</div></div>
      <div class="card-info">
        <div class="card-artist">${r.artist}</div>
        <div class="card-title">${r.title}</div>
        <div class="card-meta">${r.year} · ${r.genre}</div>
      </div></div>`;
    queueArtwork(r);
  });
  grid.innerHTML = html;
  grid.querySelectorAll('.card').forEach(c => c.addEventListener('click', () => openModal(parseInt(c.dataset.idx))));
  processQueue();
}

function openModal(idx){
  const r = getFiltered()[idx]; if(!r) return;
  const k = recordKey(r);
  document.getElementById('modal').dataset.key = k;
  document.getElementById('modal-artist').textContent = r.artist;
  document.getElementById('modal-title').textContent = r.title;
  document.getElementById('modal-tracks').textContent = r.tracks;
  document.getElementById('modal-fields').innerHTML = `
    <div class="modal-field-label">Year</div><div class="modal-field-value">${r.year}</div>
    <div class="modal-field-label">Genre</div><div class="modal-field-value">${r.genre}</div>
    <div class="modal-field-label">Format</div><div class="modal-field-value">${r.format}</div>`;
  const artEl = document.getElementById('modal-art');
  const url = artCache[k];
  if(url) artEl.innerHTML = `<img src="${url}" alt="${r.title}">`;
  else if(url===null) artEl.innerHTML = `<div class="modal-art-fallback">${vinylSVG}</div>`;
  else artEl.innerHTML = `<div class="modal-art-loading"></div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal').dataset.key = '';
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===document.getElementById('modal-overlay')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.getElementById('search').addEventListener('input', e => { currentSearch=e.target.value.trim(); renderGrid(); });
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentSort = btn.dataset.sort; renderGrid();
  });
});

renderGrid();
</script>
